            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .deep-shadow {
            box-shadow: 0 25px 50px -12px rgba(0, 61, 155, 0.15);
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>

<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="Dreamy wide angle view of a pristine tropical beach at sunrise with soft pink and orange clouds reflecting on calm turquoise water" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBxyc1BbOtUtd6WZI-i5isM2JTwq33fzTBSgVhR3dZ2sfzYxm8o8b_mRUK57J1gVGTFgWwd3WQlgGJFAx39lSaB3cU4m3o2mjsPiZnm8DckMq_6k9PUZ6u3JVbVO1TLKlq6cf2CSpFgKV4Rooq5bx8_QsP-5XxQqZ50WR20RF9IiBIsOfQdKphP9fyjJDzeMApd6ejdzRyzTNxaHBKYUlv9LuqfECcgQMa83fH1D8PJp2cp4pmAlPi7hFHXTlQmQctXMhuZiqeWXdI"/>
<div class="absolute inset-0 bg-primary/10 mix-blend-multiply"></div>
</div>
<main class="relative z-10 w-full max-w-[480px] px-6 py-12">
<div class="glass-card deep-shadow rounded-3xl p-8 md:p-12 flex flex-col items-center">
<div class="mb-8 text-center">
<div class="flex items-center justify-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-4xl" data-weight="fill">cloud_done</span>
<span class="text-3xl font-extrabold tracking-tight text-primary">CloudJourney</span>
</div>
<h1 class="text-2xl font-bold text-on-surface mb-2">Chào mừng trở lại</h1>
<p class="text-on-surface-variant text-sm">Bắt đầu hành trình tiếp theo của bạn ngay hôm nay</p>
</div>
<div class="w-full grid grid-cols-2 gap-4 mb-8">
<button class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-lowest rounded-xl hover:bg-surface-container transition-all duration-300 group border border-outline-variant/20">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>

</button>
<button class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-lowest rounded-xl hover:bg-surface-container transition-all duration-300 group border border-outline-variant/20">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05 1.72-3.2 1.72-1.13 0-1.52-.73-2.85-.73-1.34 0-1.78.71-2.85.71-1.12 0-2.23-.84-3.28-1.9-2.12-2.15-3.25-6.1-3.25-8.59 0-3.86 2.53-5.91 4.98-5.91 1.29 0 2.37.76 3.12.76.71 0 1.93-.89 3.44-.89 1.45 0 2.81.71 3.65 1.78-2.91 1.41-2.43 5.48.51 6.84-.71 1.83-1.6 3.59-2.27 4.31zM13.48 4.19c.61-.75 1.02-1.78 1.02-2.82 0-.15-.02-.3-.04-.45-1.04.04-2.3 1.01-3.05 1.88-.66.76-1.25 1.83-1.25 2.87 0 .17.02.32.06.45 1.15.09 2.3-.8 3.26-1.93z"></path>
</svg>
<span class="text-sm font-semibold text-on-surface">Apple</span>
</button>
</div>
<div class="w-full flex items-center gap-4 mb-8">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="text-xs font-medium text-on-surface-variant uppercase tracking-wider">Hoặc bằng Email</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<form class="w-full space-y-6">
<div class="space-y-2">
<label class="text-sm font-semibold text-on-surface ml-1" for="email">Địa chỉ Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full pl-11 pr-4 py-3.5 bg-surface-container-highest border-none rounded-2xl focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest transition-all text-on-surface placeholder:text-on-surface-variant/50" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-sm font-semibold text-on-surface" for="password">Mật khẩu</label>
<a class="text-xs font-semibold text-primary hover:text-primary-container transition-colors" href="#">Quên mật khẩu?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full pl-11 pr-12 py-3.5 bg-surface-container-highest border-none rounded-2xl focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest transition-all text-on-surface placeholder:text-on-surface-variant/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="pt-2">
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-3xl font-bold text-lg shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all" type="submit">
                        Đăng nhập
                    </button>
</div>
</form>
<div class="mt-8 text-center">
<p class="text-sm text-on-surface-variant">
                    Bạn chưa có tài khoản? 
                    <a class="ml-1 font-bold text-secondary-container hover:underline transition-all" href="#">Tạo tài khoản mới</a>
</p>
</div>
</div>
<div class="mt-12 text-center text-white/80 space-y-4">
<div class="flex justify-center gap-6">
<a class="text-xs font-medium hover:text-white transition-colors" href="#">Chính sách bảo mật</a>
<a class="text-xs font-medium hover:text-white transition-colors" href="#">Điều khoản dịch vụ</a>
</div>
<p class="text-[10px] uppercase tracking-[0.2em] font-bold opacity-60">© 2024 CloudJourney Digital Ventures</p>
</div>
</main>
<div class="absolute top-8 left-8 z-20 hidden md:block">
<div class="glass-card px-4 py-2 rounded-full flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-tertiary-fixed-dim animate-pulse"></span>
<span class="text-xs font-bold text-on-surface">1,240 người đang khám phá</span>
</div>
</div>
